# Vision-DPPO Quadrotor Configuration
# 6-DOF quadrotor dynamics for end-to-end motor control

# Quadrotor Physical Parameters
quadrotor:
  mass: 0.5                       # kg (typical 5-inch racing quad)
  arm_length: 0.17                # m (motor-to-center distance)
  inertia: [0.0023, 0.0023, 0.004]  # [Ixx, Iyy, Izz] kg*m^2
  gravity: 9.81                   # m/s^2
  motor_max_thrust: 4.0           # N per motor (total ~16N, ~3.2:1 thrust-to-weight)
  motor_time_constant: 0.02       # s (first-order motor lag)
  drag_coeff: 0.01                # linear drag coefficient
  torque_coeff: 0.016             # c_tau: torque-to-thrust ratio

# Time Step Configuration
timing:
  dt_inner: 0.005                 # Inner loop (200 Hz physics integration)
  dt_outer: 0.02                  # Outer loop (50 Hz RL decision)
  n_inner_steps: 4                # dt_outer / dt_inner

# Environment Configuration
environment:
  max_episode_steps: 500          # 10 seconds at 50Hz
  position_bound: 5.0             # m (terminate if |pos| exceeds)
  max_tilt_deg: 60.0              # degrees (terminate if tilt exceeds)
  initial_pos_range: 0.5          # m (random initial position spread)
  initial_vel_range: 0.2          # m/s (random initial velocity spread)
  target_type: "hover"            # "hover" or "waypoint"
  waypoint_change_interval: 3.0   # seconds between waypoint changes
  waypoint_range: 2.0             # m (max waypoint distance from origin)

# Reward Function Configuration (Gaussian style)
reward:
  reward_type: "gaussian"
  sigma_pos: 0.5                  # position error Gaussian width
  sigma_vel: 1.0                  # velocity Gaussian width
  sigma_ang: 1.0                  # angular velocity Gaussian width
  w_pos: 0.5                     # position error weight
  w_vel: 0.2                     # velocity weight
  w_ang: 0.2                     # angular velocity weight
  w_action: 0.05                 # action penalty weight
  alive_bonus: 0.1               # per-step survival bonus
  crash_penalty: 10.0            # penalty for crash/termination

# Disturbance Model
disturbance:
  enabled: true
  magnitude: 0.3                 # N (force disturbance)
  torque_magnitude: 0.05         # Nm (torque disturbance)
  probability: 0.01              # per inner step
  duration: 0.1                  # seconds
