# Flow Matching Policy v4.0 Configuration
# CTBR action space, linear interpolant (no cosine schedule, no amplification)

vision:
  image_size: 64
  channels: 3
  T_obs: 2                        # stacked frames: 2 × RGB = 6 channels input
  feature_dim: 256

imu:
  input_dim: 6                    # [gyro(3), specific_force_norm(3)]
  hidden_dim: 1024                # H3a: 64→256, H4: 256→1024 (IMU dominance: 4× capacity)
  feature_dim: 512                # H3a: 32→128, H4: 128→512 (IMU 33%→67% of global_cond)
  # global_cond_dim = vision(256) + imu(512) = 768 — IMU now dominant signal pathway

unet:
  down_dims: [256, 512]
  kernel_size: 5
  n_groups: 8
  time_embed_dim: 128
  # cond_dim = global_cond(768) + time_embed(128) = 896

action:
  T_pred: 8                       # prediction horizon
  T_action: 1                     # Run 24+: 4→1, phase lag 80ms→28ms (closed-loop at 50Hz)
  action_dim: 4                   # CTBR: [F_c_norm, wx, wy, wz]

# H4 finding: 1-step Euler inference is suboptimal post-RL (non-linear velocity field).
# Recommend n_inference_steps=2 (14ms, well within 20ms control period).

flow:
  n_inference_steps: 1            # 1-step Euler (pure OT flow matching)
  t_embed_scale: 999              # scale t∈[0,1] → int [0,999] for sinusoidal embed

training:
  batch_size: 256                 # lowered from 512: mixed recovery dataset causes CUDA OOM at 512
  learning_rate: 0.0001           # 1e-4 AdamW
  weight_decay: 0.01
  num_epochs: 500
  lr_scheduler: "cosine"
  warmup_epochs: 10
  grad_clip: 1.0
  lambda_tilt: 0.2                # auxiliary tilt supervision weight (Hypothesis 3a; 0.1→ratio=11x, 0.2→ratio=9.9x ✓)
  dataset_path: "data/expert_demos_v4.h5"
  val_split: 0.05                 # 5% episodes held out for validation
  num_workers: 0                  # data already in RAM; workers cause 5.8GB spawn-copy overhead on Windows

logging:
  tensorboard_log: "./logs/flow_policy_v4/"
  save_path: "./checkpoints/flow_policy_v4/"
  save_freq: 50                   # save checkpoint every N epochs
