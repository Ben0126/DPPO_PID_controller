# Diffusion Policy Configuration
# Phase 3: Vision-based diffusion model for action sequence generation

# Vision encoder
vision:
  image_size: 64
  channels: 3                     # RGB
  T_obs: 2                       # number of observation frames (history)
  feature_dim: 256                # output feature vector size

# Diffusion process
diffusion:
  num_timesteps: 100              # diffusion steps for training
  beta_schedule: "cosine"         # "cosine" or "linear"
  beta_start: 0.0001
  beta_end: 0.02
  ddim_steps: 10                  # inference steps (fast sampling)

# 1D U-Net architecture
unet:
  down_dims: [256, 512]           # encoder channel dimensions
  kernel_size: 5                  # 1D convolution kernel size
  n_groups: 8                     # GroupNorm groups
  time_embed_dim: 128             # timestep embedding dimension

# Action prediction
action:
  T_pred: 8                      # prediction horizon (future steps)
  T_action: 4                    # execution horizon (steps actually executed)
  action_dim: 4                  # 4 motor thrusts

# Supervised pre-training (Phase 3a)
training:
  batch_size: 256
  learning_rate: 0.0001           # 1e-4
  weight_decay: 0.01              # AdamW weight decay
  num_epochs: 500
  lr_scheduler: "cosine"          # cosine annealing
  warmup_epochs: 10
  grad_clip: 1.0
  dataset_path: "data/expert_demos_dr.h5"  # DR-enabled data (re-collected 2026-04-04)

# DPPO fine-tuning (Phase 3b)
dppo:
  enabled: true                   # Run5: P5 hypothesis validation — original pretrained (no DR-aug) + Run4 config
  advantage_beta: 0.05            # Run2(v3.1): 0.15→0.05 — max weight exp(0.15)≈1.16×; reduces noisy-advantage amplification
  gamma: 0.99
  gae_lambda: 0.95
  n_rollout_steps: 4096           # unchanged — stable advantage estimates
  n_epochs: 3                     # unchanged — conservative per-update change
  learning_rate: 0.000005         # unchanged — 5e-6 conservative fine-tuning
  value_hidden_dim: 512           # Run2(v3.1): 256→512 — larger capacity for 288D input
  value_lr: 0.0003                # unchanged
  value_warmup_updates: 50        # Run2(v3.1): freeze policy for first N updates while value net converges
  vloss_best_threshold: 500.0     # Run2(v3.1): only save best ckpt when VLoss < this value

# Logging
logging:
  tensorboard_log: "./logs/diffusion_policy/"
  save_path: "./checkpoints/diffusion_policy/"
  checkpoint_freq: 50             # save every N epochs
  log_freq: 10                    # log metrics every N batches

# Architecture v3.1 — IMU Late Fusion + FCN Auxiliary Depth
# Implement after Phase 3a Re-run 2 completes.
# Scripts: train_diffusion_v31.py (Phase 3a v3.1) + train_dppo_v31.py (Phase 3c)
# Data:    collect_data.py --v31  →  data/expert_demos_v31.h5
v31:
  # IMU encoder
  imu_feature_dim: 32            # IMU MLP output dim: Linear(6→64→32)
  global_cond_dim: 288           # vision(256) + imu(32) fed into UNet

  # Loss weights
  lambda_dispersive: 0.1         # dispersive loss (feature repulsion)
  lambda_depth: 0.1              # FCN depth auxiliary loss; set 0.0 to disable

  # Depth normalisation
  depth_max_m: 10.0              # depth value mapped to 255 (uint8 GT)

  # Dataset (v3.1 format with imu_data + depth_maps)
  dataset_path_v31: "data/expert_demos_v31.h5"

  # Ablation variants (set lambda=0 to disable each branch)
  # No IMU:   imu_feature_dim irrelevant (remove imu_encoder from model init)
  # No depth: lambda_depth: 0.0
  # Full v3.1: both enabled (default above)
