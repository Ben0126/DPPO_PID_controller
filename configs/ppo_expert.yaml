# PPO Expert Training Configuration
# Phase 1: State-based PPO for direct motor control

training:
  total_timesteps: 2000000
  learning_rate: 0.0003           # 3e-4 (linearly annealed to 0)
  n_steps: 4096                   # rollout length per update
  batch_size: 256                 # mini-batch size
  gamma: 0.99                    # discount factor
  gae_lambda: 0.95               # GAE lambda
  clip_range: 0.2                # PPO clip parameter (annealed to clip_range_end)
  clip_range_end: 0.05           # final clip range at end of training
  n_epochs: 10                   # optimization epochs per update (KL guard prevents overtraining)
  ent_coef: 0.005                # entropy coefficient (reduced: policy matures past 300K)
  vf_coef: 1.0                   # value function loss coefficient (increased to fix Value Loss ~55-80)
  max_grad_norm: 0.5             # gradient clipping
  target_kl: 0.01                # KL early stopping threshold (prevents policy churn)

network:
  hidden_dim: 256                # hidden layer size
  num_layers: 2                  # number of hidden layers
  activation: "tanh"             # activation function

logging:
  tensorboard_log: "./logs/ppo_expert/"
  save_path: "./checkpoints/ppo_expert/"
  checkpoint_freq: 100000        # save every N timesteps
  eval_freq: 50000               # evaluate every N timesteps
  eval_episodes: 10              # episodes per evaluation

quick_test:
  enabled: false
  timesteps: 50000
  hidden_dim: 64
