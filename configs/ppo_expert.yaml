# PPO Expert Training Configuration
# Phase 1: State-based PPO for direct motor control

training:
  total_timesteps: 5000000
  learning_rate: 0.0003           # 3e-4
  n_steps: 4096                   # rollout length per update
  batch_size: 256                 # mini-batch size
  gamma: 0.99                    # discount factor
  gae_lambda: 0.95               # GAE lambda
  clip_range: 0.2                # PPO clip parameter
  n_epochs: 10                   # optimization epochs per update
  ent_coef: 0.01                 # entropy coefficient (exploration)
  vf_coef: 0.5                   # value function loss coefficient
  max_grad_norm: 0.5             # gradient clipping

network:
  hidden_dim: 256                # hidden layer size
  num_layers: 2                  # number of hidden layers
  activation: "tanh"             # activation function

logging:
  tensorboard_log: "./logs/ppo_expert/"
  save_path: "./checkpoints/ppo_expert/"
  checkpoint_freq: 100000        # save every N timesteps
  eval_freq: 50000               # evaluate every N timesteps
  eval_episodes: 10              # episodes per evaluation

quick_test:
  enabled: false
  timesteps: 50000
  hidden_dim: 64
