# Vision-DPPO v4.0 RL Training Configuration
# Run 24: disturbance matched to eval (0.3N) to eliminate domain gap.
# Run 23 finding: policy learns to over-compensate 1.0N → over-correction in 0.3N eval → crash.
# Fix: train and eval now share same disturbance magnitude (0.3N).

quadrotor:
  mass: 0.5
  arm_length: 0.17
  inertia: [0.0023, 0.0023, 0.004]
  gravity: 9.81
  motor_max_thrust: 4.0
  motor_time_constant: 0.02
  drag_coeff: 0.01
  torque_coeff: 0.016

timing:
  dt_inner: 0.005
  dt_outer: 0.02
  n_inner_steps: 4

ctbr:
  F_c_max: 16.0
  omega_max_roll: 6.0
  omega_max_pitch: 6.0
  omega_max_yaw: 3.0

indi:
  kp_roll: 4.0
  kp_pitch: 4.0
  kp_yaw: 2.5
  tau_max_roll: 0.5
  tau_max_pitch: 0.5
  tau_max_yaw: 0.15

environment:
  max_episode_steps: 500
  position_bound: 5.0
  max_tilt_deg: 60.0
  initial_pos_range: 0.1          # same as eval — target=init_pos (hover mode)
  initial_vel_range: 0.3          # 6× larger than eval (0.05) — OOD velocity at reset
  target_type: "hover"
  waypoint_change_interval: 3.0
  waypoint_range: 2.0

reward:
  # Run 27: linear IAE + DENSE risk signal (tilt² + ω² per step).
  # Run 26 finding: PPO advantage normalization absorbed sparse crash_penalty (constant offset).
  # Fix: each step now carries crash-precursor penalty that varies across steps.
  reward_type: "linear_iae"
  sigma_pos: 0.30                 # unused for linear_iae
  sigma_z: 0.015
  sigma_vel: 1.0
  sigma_ang: 1.0
  w_pos: 0.5                      # -0.5×|e|
  w_z: 0.0
  w_vel: 0.05                     # -0.05×|v|
  w_ang: 0.3                      # NEW: -0.3×|ω|² (quadratic, was 0.1 linear)
  w_tilt: 1.0                     # NEW: -1.0×tilt² (rad²). At 30° tilt: -0.27; at 60°: -1.10 (crash threshold)
  w_action: 0.005
  alive_bonus: 1.0                # +1/step survival
  crash_penalty: 100.0            # backup terminal penalty

domain_randomization:
  enabled: true
  sky_color_range: 40
  ground_color_range: 40
  brightness_range: [0.7, 1.3]
  focal_scale_range: [0.30, 0.50]
  crosshair_size_delta: 2
  per_frame_noise_sigma: 5

disturbance:
  enabled: true
  magnitude: 0.3          # Run 24: matched to eval (was 1.0N → domain gap → over-correction → crash)
  torque_magnitude: 0.02  # matched to eval
  probability: 0.01
  duration: 0.1           # matched to eval
