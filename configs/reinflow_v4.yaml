# ReinFlow v4.0 Configuration
# Run 22: PPO Clipped Surrogate — replace exp(β·A) weighted MSE with true PPO
#   - SDE rollout: a = μ_old + σ·ε, enabling Gaussian likelihood ratios
#   - log_ratio = -0.5/σ² × [||a−μ_new||² − ||a−μ_old||²]
#   - PPO trust region makes LR=1e-5 (100× increase) safe; n_epochs=4 now meaningful
#   - curriculum disabled to isolate single variable: does true PPO break the 0.6948 ceiling?
#   - total_updates=200 for short sanity test; extend to 700 if hypothesis confirmed

rl:
  loss_type: clipped              # clipped | weighted
  sde_noise_std: 0.3              # Run22b: σ=0.1 → sensitivity 50x (too high). σ=0.3 → 5.6x (target 2-5x)
  clip_epsilon: 0.2               # PPO clip range
  learning_rate: 1.0e-5           # 100× higher than Run 19/20: PPO trust region is the safety net
  value_lr: 1.0e-3
  value_hidden_dim: 256
  n_rollout_steps: 4096
  n_epochs: 4                     # was 1: PPO clipping makes multi-epoch safe
  mini_batch: 256
  gamma: 0.99
  gae_lambda: 0.95
  advantage_beta: 0.1             # kept but unused when loss_type=clipped
  grad_clip: 1.0
  value_warmup_updates: 50        # was 100: shorter warmup, gate still guards
  vloss_gate: 50.0              # was 10.0: no-curriculum env has higher VLoss variance
  vloss_best_threshold: 100.0
  save_freq_ckpt: 10
  total_updates: 200              # short sanity test; extend to 700 after confirmation
  lambda_bc: 0.001                # was 0.01: PPO clip already constrains policy
  demo_path: data/expert_demos_v4.h5
  demo_episodes: 100

curriculum:
  enabled: false                  # disabled to isolate loss_type as single variable

logging:
  tensorboard_log: "./logs/reinflow_v4/"
  save_path: "./checkpoints/reinflow_v4/"
  save_freq: 50
